server {
    listen      80;
    #listen      443 ssl http2;
    server_name 127mc.develop www.127mc.develop;
    root        /var/www/web/epu/Public/;
    index       index.php index.html index.htm;
    charset     utf-8;

    # ssl on;
    # ssl_certificate    /etc/nginx/api.crt;
    # ssl_certificate_key  /etc/nginx/api.key;
    # ssl_session_timeout 5m;
    # ssl_protocols SSLv3 TLSv1 TLSv1.1 TLSv1.2;

    access_log            /var/log/nginx/127mc.develop.access.log;
    error_log             /var/log/nginx/127mc.develop.error.log;

    location / {
        if (!-e $request_filename){
            rewrite  ^(.*)$  /index.php?s=$1  last;   break;
        }
        #try_files $uri $uri/ /index.php?s=$uri&$args;
        client_max_body_size 100m;
    }

    location ~ \.php$ {
        try_files     $uri =404;

        fastcgi_pass  php_proxys;
        fastcgi_index /index.php;

        include fastcgi_params;
        fastcgi_split_path_info       ^(.+\.php)(/.+)$;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\.ht {
        deny all;
    }
}
