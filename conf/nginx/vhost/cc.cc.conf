
# cc.cc || www.cc.cc || tp.cc.cc
server
{
    listen 80;
    server_name cc.cc kf.cc.cc;
    index index.html index.htm index.php default.html default.htm default.php;
    root /var/www/html/servic/public/;

    #ејҖеҗҜgzipеҺӢзј©иө„жәҗ
    gzip  on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.0;
    gzip_min_length 100;
    gzip_types text/plain text/css application/javascript application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/vnd.ms-fontobject application/x-font-ttf font/opentype image/svg+xml image/x-icon;

    # й…ҚзҪ®й”ҷиҜҜйЎө
    error_page 404 /404.html; #йЎ№зӣ®дёӢеӯҳеңЁж–Үд»¶
    error_page 500 502 503 504 =200 /50x.html;
    access_log  /var/www/logs/access_cc_cc.log;

    # е°Ҷеҗ«жңүwwwзҡ„ең°еқҖи·іиҪ¬еҲ°дёҚеҢ…еҗ«wwwзҡ„ең°еқҖпјҢе°Ҷhttpи·іиҪ¬еҲ°https
    location /
    {
        # дёүзә§еҹҹеҗҚ(http://www.cc.cc) иҪ¬дёә дәҢзә§еҹҹеҗҚ(http://cc.cc)
        if ($host ~* ^www\.(?<nowww>.*)$) {
           rewrite .* $scheme://$nowww$request_uri permanent;
        }

        proxy_pass http://nginx_proxys; #д»ЈзҗҶ
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Slave $upstream_addr;
    }

    # location ~ [^/]\.php(/|$)
    # {
    #     try_files $uri =404;
    #     #fastcgi_pass  127.0.0.1:9000; #дҪҝз”ЁTCPйҖҡи®Ҝж–№ејҸиҝһжҺҘphp-fpm,еҰӮжһңnginxи®ҫзҪ®дәҶеҸҚеҗ‘д»ЈзҗҶеҲҷдҪҝз”ЁиҝҷдёӘ
    #     fastcgi_pass  unix:/dev/shm/php7.4-fpm.sock; #дҪҝз”ЁUNIX Domain SocketйҖҡи®Ҝж–№ејҸиҝһжҺҘphp-fpm;еҸҜеҮҸе°‘TCPиө„жәҗ
    #     fastcgi_index index.php;

    #     include fastcgi_params;
    #     set $real_script_name $fastcgi_script_name;
    #     if ($fastcgi_script_name ~ "^(.+?\.php)(/.+)$") {
    #         set $real_script_name $1;
    #         set $path_info $2;
    #     }
    #     fastcgi_param SCRIPT_FILENAME $document_root$real_script_name;
    #     fastcgi_param SCRIPT_NAME $real_script_name;
    #     fastcgi_param PATH_INFO $path_info;
    #     # add_header Hi "My name is twbworld";
    # }

    # еҸҜжҠҠеӣҫзүҮйҮҚе®ҡеҗ‘еҲ°еӣҫеәҠ
    #location ~ /images/.*?.(gif|jpg|jpeg|png|bmp|swf)$
    #{
    #    rewrite ^(.*)$ /imgNotFound.php?_url=$1 last;
    #}

    #еүҚз«Ҝж–Үд»¶иҝӣиЎҢзј“еӯҳ
    location ~* \.(css|js|json|png|jpg|jpeg|gif|txt|ico|bmp|swf)$|^~/static/
    {
        # proxy_pass http://nginx_proxys2;
        # proxy_redirect off;
        # proxy_set_header Host $host;
        # proxy_cache cache_one; #cache_oneеңЁhttpи®ҫзҪ®еұӮproxy_cache_pathе®ҡд№ү
        # proxy_cache_valid 200 302 24h;
        # proxy_cache_valid 301 30d;
        # proxy_cache_valid any 5m;
        # expires 90d;
        # add_header wall  "hey!guys!give me a star.";
        root /var/www/servic/public/;
    }

    #зҰҒжӯўи®ҝй—®зҡ„ж–Үд»¶жҲ–зӣ®еҪ•
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }


    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$
    {
        expires      30d;
        access_log off;
    }

    location ~ .*\.(js|css)?$
    {
        expires      12h;
        access_log off;
    }

    # й”ҷиҜҜйЎөи®ҝй—®и·Ҝеҫ„,дҪҝз”ЁnginxиҮӘеёҰзҡ„html
    location = /50x.html {
        root   /usr/local/nginx/html/;
        internal;
    }
}


#дҪңдёәд»ЈзҗҶ(proxy)
server
{
    listen 8080;
    server_name cc.cc kf.cc.cc;
    index index.html index.htm index.php default.html default.htm default.php;
    root /var/www/html/servic/public/;

    # й…ҚзҪ®й”ҷиҜҜйЎө
    error_page 404 /404.html; #йЎ№зӣ®дёӢеӯҳеңЁж–Үд»¶
    error_page 500 502 503 504 =200 /50x.html;
    access_log  /var/www/logs/nginx_access_cc_cc.log;

    location /
    {
        if (!-e $request_filename) {
            rewrite ^/(.*)$ /index.php/$1 last;
            break;
        }
    }

    location ~ [^/]\.php(/|$)
    {
        # proxy_pass http://php:9501;
        # proxy_http_version 1.1;
        # proxy_set_header Connection "keep-alive";
        # proxy_set_header X-Real-IP $remote_addr;

        try_files $uri =404;
        fastcgi_pass php:9000; #dockerе®№еҷЁ
        fastcgi_index index.php;

        include fastcgi_params;
        set $real_script_name $fastcgi_script_name;
        if ($fastcgi_script_name ~ "^(.+?\.php)(/.+)$") {
            set $real_script_name $1;
            set $path_info $2;
        }
        fastcgi_param SCRIPT_FILENAME $document_root$real_script_name;
        fastcgi_param SCRIPT_NAME $real_script_name;
        fastcgi_param PATH_INFO $path_info;
    }

    # й”ҷиҜҜйЎөи®ҝй—®и·Ҝеҫ„,дҪҝз”ЁnginxиҮӘеёҰзҡ„html
    location = /50x.html {
        root   /usr/local/nginx/html/;
        internal;
    }

}


